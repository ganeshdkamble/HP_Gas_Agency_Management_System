{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">

    <h2>Gas Connections</h2>

    <a href="/new_connection" class="btn btn-primary">
        + New Connection
    </a>

</div>

<div class="card shadow">

<div class="card-body">

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Customer</th>
<th>Connection No</th>
<th>Type</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for c in connections %}

<tr>

<td>{{ c.id }}</td>
<td>{{ c.full_name }}</td>
<td>{{ c.connection_no }}</td>
<td>{{ c.connection_type }}</td>
<td>{{ c.status }}</td>

<td>

<a href="/edit_connection/{{ c.id }}"
class="btn btn-warning btn-sm">

Edit

</a>

<a href="/delete_connection/{{ c.id }}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete Connection?')">

Delete

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

{% endblock %}
