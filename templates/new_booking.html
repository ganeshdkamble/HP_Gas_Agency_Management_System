{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                <h3>New Cylinder Booking</h3>
            </div>

            <div class="card-body">

                <form action="/save_booking" method="POST">

                    <!-- Customer + Connection -->

                    <div class="mb-3">

                        <label class="form-label">
                            Customer / Connection
                        </label>

                        <select
                            name="connection_id"
                            class="form-select"
                            required>

                            <option value="">
                                Select Customer
                            </option>

                            {% for con in connections %}

                            <option value="{{ con.id }}">

                                {{ con.full_name }}
                                -
                                {{ con.connection_no }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Booking Date -->

                    <div class="mb-3">

                        <label class="form-label">

                            Booking Date

                        </label>

                        <input
                        type="date"
                        name="booking_date"
                        class="form-control"
                        required>

                    </div>

                    <!-- Cylinder -->

                    <div class="mb-3">

                        <label class="form-label">

                            Cylinder Type

                        </label>

                        <select
                        name="cylinder_type"
                        class="form-select">

                            <option value="14.2 KG">
                                14.2 KG Domestic
                            </option>

                            <option value="19 KG">
                                19 KG Commercial
                            </option>

                            <option value="5 KG">
                                5 KG
                            </option>

                        </select>

                    </div>

                    <!-- Quantity -->

                    <div class="mb-3">

                        <label class="form-label">

                            Quantity

                        </label>

                        <input
                        type="number"
                        name="quantity"
                        value="1"
                        min="1"
                        class="form-control">

                    </div>

                    <!-- Status -->

                    <div class="mb-3">

                        <label class="form-label">

                            Delivery Status

                        </label>

                        <select
                        name="delivery_status"
                        class="form-select">

                            <option value="Pending">
                                Pending
                            </option>

                            <option value="Out for Delivery">
                                Out for Delivery
                            </option>

                            <option value="Delivered">
                                Delivered
                            </option>

                        </select>

                    </div>

                    <button
                    type="submit"
                    class="btn btn-success">

                        Save Booking

                    </button>

                    <a
                    href="/bookings"
                    class="btn btn-secondary">

                        Back

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
