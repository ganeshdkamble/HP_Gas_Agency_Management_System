{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                <h3>New Cylinder Delivery</h3>
            </div>

            <div class="card-body">

                <form action="/save_delivery" method="POST">

                    <!-- Booking -->

                    <div class="mb-3">

                        <label class="form-label">
                            Select Booking
                        </label>

                        <select name="booking_id"
                                class="form-select"
                                required>

                            <option value="">
                                Select Booking
                            </option>

                            {% for b in bookings %}

                            <option value="{{ b.id }}">

                                {{ b.full_name }}
                                -
                                {{ b.connection_no }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Delivery Boy -->

                    <div class="mb-3">

                        <label class="form-label">
                            Delivery Boy
                        </label>

                        <select name="employee_id"
                                class="form-select"
                                required>

                            <option value="">
                                Select Delivery Boy
                            </option>

                            {% for e in employees %}

                            <option value="{{ e.id }}">

                                {{ e.employee_name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Delivery Date -->

                    <div class="mb-3">

                        <label class="form-label">
                            Delivery Date
                        </label>

                        <input
                            type="date"
                            name="delivery_date"
                            class="form-control"
                            required>

                    </div>

                    <!-- Status -->

                    <div class="mb-3">

                        <label class="form-label">
                            Delivery Status
                        </label>

                        <select name="status"
                                class="form-select">

                            <option value="Pending">
                                Pending
                            </option>

                            <option value="Out for Delivery">
                                Out for Delivery
                            </option>

                            <option value="Delivered">
                                Delivered
                            </option>

                        </select>

                    </div>
                 

                    <button class="btn btn-success">
                        Save Delivery
                    </button>

                    <a href="/deliveries"
                       class="btn btn-secondary">
                        Back
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
